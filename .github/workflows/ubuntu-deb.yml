name: Ubuntu DEB Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (example: 1.0.0)"
        required: false
        default: "1.0.0"
  push:
    tags:
      - "v*"

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev python3-venv python3-tk

      - name: Build .deb package
        shell: bash
        run: |
          chmod +x scripts/linux/build_deb.sh
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="1.0.0"
          fi
          ./scripts/linux/build_deb.sh "${VERSION}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManuscriptEditor-Ubuntu-DEB
          path: dist_deb/*.deb
