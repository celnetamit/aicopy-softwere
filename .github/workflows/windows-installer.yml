name: Windows Installer Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build portable executable
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name ManuscriptEditor --add-data "web;web" --collect-all eel --hidden-import pkg_resources --hidden-import bottle_websocket --hidden-import geventwebsocket --hidden-import tkinter --hidden-import tkinter.filedialog main.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc packaging/windows/ManuscriptEditor.iss

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManuscriptEditor-Windows-Portable
          path: dist/ManuscriptEditor/**

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManuscriptEditor-Windows-Installer
          path: dist_installer/*.exe
